<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customer Dashboard - Tractor Rental Service</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .dashboard-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .dashboard-header {
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white;
      padding: 20px 30px;
      border-radius: 16px 16px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    .dashboard-header h1 {
      color: white;
      margin: 0;
      font-size: 1.8rem;
    }
    .dashboard-content {
      background: white;
      padding: 30px;
      border-radius: 0 0 16px 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
    .info-card {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 25px;
      border: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    .info-card h3 {
      margin-top: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #2c3e50;
      font-size: 1.3rem;
    }
    .info-card p {
      margin: 12px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #495057;
    }
    .info-card ul {
      margin: 10px 0;
      padding-left: 25px;
    }
    .info-card li {
      margin: 10px 0;
      color: #495057;
    }
    .contact-card {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 15px;
    }
    .contact-item {
      background: white;
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .language-selector {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 25px 0;
      padding: 20px;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      border-radius: 12px;
    }
    .language-selector label {
      color: white;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .language-selector select {
      width: auto;
      min-width: 150px;
      padding: 10px 15px;
      border-radius: 8px;
      border: 2px solid #3498db;
      background: white;
      color: #2c3e50;
      font-weight: 600;
      cursor: pointer;
    }
    .table-container {
      overflow-x: auto;
      margin-top: 25px;
    }
    /* Modern Table Styling */
    #work-table {
      width: 100%;
      min-width: 600px;
      border-collapse: separate;
      border-spacing: 0;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    #work-table th {
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white;
      font-weight: 600;
      padding: 16px 14px;
      text-align: center;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      border: none;
    }
    #work-table th:first-child {
      border-top-left-radius: 16px;
    }
    #work-table th:last-child {
      border-top-right-radius: 16px;
    }
    #work-table td {
      padding: 16px 14px;
      text-align: center;
      border-bottom: 1px solid #ecf0f1;
      transition: all 0.2s;
    }
    #work-table tbody tr:hover {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      transform: scale(1.01);
    }
    #work-table tbody tr:last-child td {
      border-bottom: none;
    }
    /* Amount styling */
    .amount {
      font-weight: 700;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .amount-paid {
      color: #27ae60;
    }
    .amount-balance {
      color: #e74c3c;
    }
    /* Total row */
    .total-row {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      font-weight: bold;
    }
    .total-row td {
      padding: 18px 14px;
      font-size: 1.1rem;
    }
    /* Customer name display */
    .customer-name-display {
      margin-top: 15px;
      font-weight: 700;
      font-size: 1.6rem;
      color: #2c3e50;
      background: linear-gradient(135deg, #3498db, #2980b9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #95a5a6;
    }
    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      color: #bdc3c7;
    }
    /* Section title */
    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: #2c3e50;
      font-size: 1.4rem;
    }
    /* Responsive */
    @media (max-width: 768px) {
      .dashboard-content {
        padding: 15px;
      }
      .contact-card {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1><i class="fas fa-tachometer-alt"></i> Customer Dashboard</h1>
      <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <div class="dashboard-content">
      <div class="info-card">
        <h3><i class="fas fa-info-circle"></i> <span data-i18n="about">About Owner</span></h3>
        <div class="info-content">
          <p><i class="fas fa-map-marker-alt" style="color: #3498db;"></i> <strong data-i18n="district">District:</strong> Namakkal</p>
          <p><i class="fas fa-map-pin" style="color: #3498db;"></i> <strong data-i18n="place">Place:</strong> Maanikkavellur</p>
          <p><i class="fas fa-user-tie" style="color: #3498db;"></i> <strong data-i18n="ownerName">Owner Name:</strong> Srithar. K</p>
          <p><i class="fas fa-phone" style="color: #3498db;"></i> <strong data-i18n="contactNumbers">Contact Numbers:</strong></p>
          <div class="contact-card">
            <div class="contact-item"><i class="fas fa-phone"></i> 9786252908 (Srithar)</div>
            <div class="contact-item"><i class="fas fa-phone"></i> 8489337908 (Manoj Kumar)</div>
            <div class="contact-item"><i class="fas fa-phone"></i> 6374960431 (Rithish Kumar)</div>
          </div>
        </div>
        <div id="customer-name-display" class="customer-name-display"></div>
      </div>
      
      <div class="language-selector">
        <label for="language-select"><i class="fas fa-globe"></i> <span data-i18n="selectLanguage">Select Language:</span></label>
        <select id="language-select">
          <option value="en">English</option>
          <option value="ta">தமிழ்</option>
        </select>
      </div>
      
      <h3 class="section-title" id="work-details-title"><i class="fas fa-list"></i> <span data-i18n="yourWorkDetails">Your Work Details</span></h3>
      <div class="table-container">
        <table id="work-table">
          <thead>
            <tr>
              <th data-i18n="date">Date</th>
              <th data-i18n="type">Type</th>
              <th data-i18n="time">Total Time</th>
              <th data-i18n="amount">Amount</th>
              <th data-i18n="paid">Paid</th>
              <th data-i18n="balance">Balance</th>
            </tr>
          </thead>
          <tbody></tbody>
          <tfoot>
            <tr class="total-row">
              <td colspan="5" style="text-align:right;"><strong data-i18n="total">Total</strong></td>
              <td id="total-balance">₹0.00</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Translations object
    const panelTranslations = {
      en: {
        about: "About Owner", district: "District:", place: "Place:",
        ownerName: "Owner Name:", contactNumbers: "Contact Numbers:",
        selectLanguage: "Select Language:", yourWorkDetails: "Your Work Details",
        date: "Date", type: "Type", time: "Total Time", amount: "Amount", paid: "Paid", balance: "Balance", total: "Total", logout: "Logout",
        noWork: "No work entries found"
      },
      ta: {
        about: "உரிமையாளர் விவரங்கள்", district: "மாவட்டம்:", place: "இடம்:",
        ownerName: "சொந்தக்காரர் பெயர்:", contactNumbers: "தொடர்பு எண்கள்:",
        selectLanguage: "மொழியைத் தேர்வுசெய்க:", yourWorkDetails: "உங்கள் வேலை விவரங்கள்",
        date: "தேதி", type: "வகை", time: "மொத்த நேரம்", amount: "தொகை", paid: "கொடுத்தது", balance: "மீதம்", total: "மொத்தம்", logout: "வெளியேறு",
        noWork: "வேலை பதிவுகள் இல்லை"
      }
    };

    // Run immediately when script loads
    (function initCustomerPanel() {
      const username = sessionStorage.getItem('customer_username');
      if (!username) {
        window.location.href = 'customer-login.html';
        return;
      }
      
      // Set up logout button
      const logoutBtn = document.querySelector('.logout-btn');
      if (logoutBtn) {
        logoutBtn.onclick = function() {
          sessionStorage.removeItem('customer_username');
          sessionStorage.removeItem('language');
          window.location.href = 'index.html';
        };
      }
      
      // Set up language selector
      const langSelect = document.getElementById('language-select');
      if (langSelect) {
        const currentLang = sessionStorage.getItem('language') || 'en';
        langSelect.value = currentLang;
        langSelect.onchange = function() {
          sessionStorage.setItem('language', this.value);
          updatePanelTranslations();
          loadPanelCustomerData();
        };
      }
      
      // Initial load
      updatePanelTranslations();
      loadPanelCustomerData();
    })();

    function getPanelLanguage() {
      return sessionStorage.getItem('language') || 'en';
    }

    function updatePanelTranslations() {
      const lang = getPanelLanguage();
      const translations = panelTranslations;
      
      // Update elements with data-i18n attribute
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
      
      // Update table headers
      const headersMap = { 1: 'date', 2: 'type', 3: 'time', 4: 'amount', 5: 'paid', 6: 'balance' };
      const theadCells = document.querySelectorAll('#work-table thead th');
      theadCells.forEach((th, idx) => {
        const key = headersMap[idx + 1];
        if (key && translations[lang] && translations[lang][key]) {
          th.textContent = translations[lang][key];
        }
      });
      
      // Update total label
      const totalCell = document.querySelector('#work-table tfoot tr td strong');
      if (totalCell && translations[lang] && translations[lang]['total']) {
        totalCell.textContent = translations[lang]['total'];
      }
    }

    function formatPanelTimeDecimal(float) {
      float = parseFloat(float);
      if (isNaN(float)) return "";
      let h = Math.floor(float);
      let decimal = float - h;
      let m = Math.round(decimal * 10);
      return m === 0 ? `${h}` : `${h}.${m.toString().padStart(2,'0')}`;
    }

    function loadPanelCustomerData() {
      const username = sessionStorage.getItem('customer_username');
      if (!username) return;
      
      // Load customer name
      let users = JSON.parse(localStorage.getItem('tractor_users')) || [];
      let customer = users.find(u => u.username === username);
      if (customer) {
        document.getElementById('customer-name-display').textContent = `Customer Name: ${customer.name}`;
      }
      
      // Load work entries
      let workEntries = JSON.parse(localStorage.getItem("work_entries")) || [];
      let userEntries = workEntries.filter(e => e.username === username);
      let tbody = document.querySelector("#work-table tbody");
      tbody.innerHTML = "";
      let totalBalance = 0;
      
      if (userEntries.length === 0) {
        const lang = getPanelLanguage();
        tbody.innerHTML = `
          <tr>
            <td colspan="6">
              <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>${panelTranslations[lang].noWork || 'No work entries found'}</p>
              </div>
            </td>
          </tr>
        `;
      } else {
        userEntries.forEach(entry => {
          const balance = entry.amount - entry.paid;
          totalBalance += balance;
          tbody.innerHTML += `
            <tr>
              <td>${entry.date}</td>
              <td><strong>${entry.cultivator}</strong></td>
              <td>${entry.timeStr || formatPanelTimeDecimal(entry.time)} hrs</td>
              <td class="amount">₹${entry.amount.toFixed(2)}</td>
              <td class="amount amount-paid">₹${entry.paid.toFixed(2)}</td>
              <td class="amount amount-balance">₹${balance.toFixed(2)}</td>
            </tr>
          `;
        });
      }
      
      document.getElementById("total-balance").innerText = `₹${totalBalance.toFixed(2)}`;
    }
  </script>
</body>
</html>
