<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Customer</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { padding: 20px; }
    h1 { color: var(--text-color); }
    form {
      max-width: 400px; background: var(--card-bg); padding: 30px; border-radius: var(--border-radius);
      box-shadow: 0 10px 30px var(--shadow-lg); border: 1px solid var(--table-border);
    }
    label { display: block; margin-top: 15px; font-weight: bold; color: var(--text-color); }
    input { width: 100%; padding: 12px; margin-top: 6px; box-sizing: border-box; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text-color); }
    input:focus { border-color: var(--input-focus); box-shadow: 0 0 5px rgba(49, 130, 206, 0.3); }
    button {
      margin-top: 25px; padding: 12px 24px; background: var(--button-bg); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s ease;
    }
    button:hover { background: var(--button-hover); transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
    #back-button { margin-bottom: 20px; background: var(--secondary-color); color: white; border: none; padding: 10px 16px; cursor: pointer; border-radius: 6px; font-weight: bold; }
    #back-button:hover { background: var(--primary-color); }
    .message { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 6px; }
    .error { color: var(--error-color); background: rgba(229, 62, 62, 0.1); border: 1px solid rgba(229, 62, 62, 0.2); }
    .success { color: var(--success-color); background: rgba(56, 161, 105, 0.1); border: 1px solid rgba(56, 161, 105, 0.2); }
  </style>
</head>
<body>
  <button id="back-button" onclick="goBack()">← Back to Customer List</button>
  <h1>Edit Customer Details</h1>
  <form id="edit-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Leave blank to keep unchanged" />
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required />
    <label for="nickname">Nickname</label>
    <input type="text" id="nickname" name="nickname" />
    <button type="submit">Save Changes</button>
  </form>
  <div id="message" class="message"></div>
  <script>
    function goBack() {
      window.location.href = 'owner-panel.html';
    }
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }
    function loadCustomer(username) {
      const users = JSON.parse(localStorage.getItem('tractor_users')) || [];
      const user = users.find(u => u.username === username);
      if (!user) {
        document.getElementById('message').innerText = 'Customer not found.';
        document.getElementById('message').classList.add('error');
        document.getElementById('edit-form').style.display = 'none';
        return null;
      }
      document.getElementById('username').value = user.username;
      document.getElementById('password').value = '';
      document.getElementById('name').value = user.name;
      document.getElementById('nickname').value = user.nickname || '';
      return user;
    }
    function showMessage(message, isError) {
      const msgDiv = document.getElementById('message');
      msgDiv.innerText = message;
      msgDiv.classList.toggle('error', isError);
      msgDiv.classList.toggle('success', !isError);
    }
    document.getElementById('edit-form').addEventListener('submit', function(e) {
      e.preventDefault();
      let originalUsername = getQueryParam('username');
      if (!originalUsername) return;
      let newUsername = document.getElementById('username').value.trim();
      let newPassword = document.getElementById('password').value;
      let newName = document.getElementById('name').value.trim();
      let newNickname = document.getElementById('nickname').value.trim();
      if (!newUsername || !newName) {
        showMessage('Username and Name are required.', true);
        return;
      }
      let users = JSON.parse(localStorage.getItem('tractor_users')) || [];
      let userIndex = users.findIndex(u => u.username === originalUsername);
      if (userIndex === -1) {
        showMessage('Original customer not found.', true);
        return;
      }
      if (newUsername !== originalUsername && users.some(u => u.username === newUsername)) {
        showMessage('Username already taken by another customer.', true);
        return;
      }
      // Update user info
      users[userIndex].username = newUsername;
      if (newPassword.trim() !== '') {
        users[userIndex].password = newPassword;
      }
      users[userIndex].name = newName;
      users[userIndex].nickname = newNickname || '';
      localStorage.setItem('tractor_users', JSON.stringify(users));
      // Update username in work entries
      let workEntries = JSON.parse(localStorage.getItem('work_entries')) || [];
      workEntries.forEach(entry => {
        if (entry.username === originalUsername) {
          entry.username = newUsername;
        }
      });
      localStorage.setItem('work_entries', JSON.stringify(workEntries));
      showMessage('Customer details updated successfully.', false);
    });
    const username = getQueryParam('username');
    if (!username) {
      document.getElementById('message').innerText = 'No customer specified.';
      document.getElementById('message').classList.add('error');
      document.getElementById('edit-form').style.display = 'none';
    } else {
      loadCustomer(username);
    }
  </script>
</body>
</html>
